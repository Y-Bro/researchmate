[tool.ruff]
target-version = "py312"
line-length = 88

[tool.ruff.lint]
# E/W = pycodestyle (E101 mixed tabs/spaces, W191 tab indentation),
# F = pyflakes, I = isort import ordering
select = ["E", "W", "F", "I"]

[tool.ruff.format]
indent-style = "space"

[tool.mypy]
python_version = "3.12"
strict = true
